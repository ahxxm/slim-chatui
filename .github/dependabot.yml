version: 2
updates:
  - package-ecosystem: uv
    directory: '/'
    schedule:
      interval: monthly
    target-branch: 'main'

  - package-ecosystem: pip
    directory: '/backend'
    schedule:
      interval: monthly
    target-branch: 'main'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: monthly
    target-branch: 'main'
