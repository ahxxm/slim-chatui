[project]
name = "slim-chatui"
description = "Opinionated hard fork of Open WebUI"
authors = [
    { name = "Timothy Jaeryang Baek", email = "tim@openwebui.com" }
]
license = { file = "LICENSE" }
dependencies = [
    "fastapi==0.128.5",
    "uvicorn[standard]==0.40.0",
    "pydantic==2.12.5",
    "python-multipart==0.0.22",

    "python-socketio==5.16.1",
    "cryptography",
    "bcrypt==5.0.0",
    "PyJWT[crypto]==2.11.0",
    "authlib==1.6.7",

    "requests==2.32.5",
    "aiohttp==3.13.2", # do not update to 3.13.3 - broken
    "aiocache",
    "aiofiles",
    "starlette-compress==1.7.0",
    "Brotli==1.1.0",
    "httpx[socks,http2,zstd,cli,brotli]==0.28.1",
    "starsessions[redis]==2.2.1",
    "python-mimeparse==2.0.0",

    "sqlalchemy==2.0.46",
    "alembic==1.18.3",
    "peewee==3.19.0",
    "peewee-migrate==1.14.3",

    "redis",

    "pytz==2025.2",

    "loguru==0.7.3",
    "asgiref==3.11.1",

    "tiktoken",
    "mcp==1.26.0",

    "langchain==1.2.9",
    "langchain-community==0.4.1",
    "langchain-classic==1.0.1",
    "langchain-text-splitters==1.1.0",

    "chromadb==1.4.1",
    "opensearch-py==3.1.0",

    "transformers==5.1.0",
    "sentence-transformers==5.2.2",

    "ftfy==6.3.1",
    "pypdf==6.7.0",
    "docx2txt==0.9",
    "python-pptx==1.0.2",
    "unstructured==0.18.31",
    "Markdown==3.10.1",
    "validators==0.35.0",
    "azure-ai-documentintelligence==1.0.2",
    "azure-identity==1.25.1",

    "black==26.1.0",
    "youtube-transcript-api==1.2.4",

    "ddgs==9.10.0",
]
readme = "README.md"
requires-python = ">= 3.11, < 3.13.0a1"
dynamic = ["version"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications :: Chat",
    "Topic :: Multimedia",
]

[project.optional-dependencies]
postgres = [
    "psycopg2-binary==2.9.11",
    "pgvector==0.4.2",
]

all = [
    "pymongo",
    "psycopg2-binary==2.9.11",
    "pgvector==0.4.2",
    "docker~=7.1.0",
    "pytest~=8.3.2",
    "pytest-docker~=3.2.5",
    "playwright==1.58.0", # Caution: version must match docker-compose.playwright.yaml - Update the docker-compose.yaml if necessary
    "elasticsearch==9.3.0",

    "qdrant-client==1.16.2",
    
    "weaviate-client==4.19.2",
    "pymilvus==2.6.8",
    "pinecone==6.0.2",
    "oracledb==3.4.2",
    "colbert-ai==0.2.22",

    "firecrawl-py==4.14.0",
    "azure-search-documents==11.6.0",
]

[project.scripts]
open-webui = "open_webui:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.version]
path = "package.json"
pattern = '"version":\s*"(?P<version>[^"]+)"'

[tool.hatch.build.hooks.custom]  # keep this for reading hooks from `hatch_build.py`

[tool.hatch.build.targets.wheel]
sources = ["backend"]
exclude = [
    ".dockerignore",
    ".gitignore",
    ".webui_secret_key",
    "dev.sh",
    "start.sh",
    "start_windows.bat",
    "webui.db",
    "chroma.sqlite3",
]
force-include = { build = "open_webui/frontend" }

[tool.codespell]
# Ref: https://github.com/codespell-project/codespell#using-a-config-file
skip = '.git*,*.svg,package-lock.json,i18n,*.lock,*.css,*-bundle.js,locales,example-doc.txt,emoji-shortcodes.json'
check-hidden = true
# ignore-regex = ''
ignore-words-list = 'ans'

[dependency-groups]
dev = [
    "pytest-asyncio>=1.0.0",
]
